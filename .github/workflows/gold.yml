name: Gold Monitor

on:
  schedule:
    # 北京时间每小时一次
    - cron: '0 * * * *'

  workflow_dispatch:

jobs:
  run:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: |
          pip install -r requirements.txt

      - name: Run
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          python main.py
